<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Coastarian.com is coming soon.">
  <title>Coastarian.com | Coming Soon</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Karla:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --shell: #fff9ed;
      --foam: #dff7f1;
      --sand: #f4dca8;
      --deep: #092323;
      --reef: #0f5e5d;
      --sun: #f5c970;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: "Karla", Arial, sans-serif;
      color: var(--sand);
      background: var(--deep);
      overflow: hidden;
    }

    .holding-page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(1.5rem, 4vw, 4rem);
      isolation: isolate;
    }

    .holding-page::before {
      content: "";
      position: absolute;
      inset: -2.5%;
      z-index: -3;
      background-image: url("images/coastarian/kenyan-coast-hero.png");
      background-size: cover;
      background-position: center;
      transform: scale(1.02);
      animation: coastal-breeze 18s ease-in-out infinite alternate;
    }

    .tree-motion,
    .tree-motion::before,
    .tree-motion::after,
    .water-motion,
    .water-motion::before,
    .water-motion::after {
      position: absolute;
      z-index: -1;
      pointer-events: none;
    }

    .tree-motion {
      inset: 0;
      overflow: hidden;
    }

    .tree-motion::before,
    .tree-motion::after {
      content: "";
      inset: -2.5%;
      background-image: url("images/coastarian/kenyan-coast-hero.png");
      background-size: cover;
      background-position: center;
      filter: saturate(1.08) contrast(1.02) blur(0.4px);
      mix-blend-mode: screen;
    }

    .tree-motion::before {
      opacity: 0.16;
      transform-origin: 86% 62%;
      animation: palm-sway 4.8s ease-in-out infinite;
      -webkit-mask-image: radial-gradient(ellipse at 82% 28%, #000 0 28%, rgba(0, 0, 0, 0.68) 42%, transparent 64%);
      mask-image: radial-gradient(ellipse at 82% 28%, #000 0 28%, rgba(0, 0, 0, 0.68) 42%, transparent 64%);
    }

    .tree-motion::after {
      animation: frond-gust 5.8s ease-in-out infinite reverse;
      opacity: 0.13;
      transform-origin: 83% 78%;
      -webkit-mask-image: radial-gradient(ellipse at 86% 66%, #000 0 24%, rgba(0, 0, 0, 0.62) 40%, transparent 62%);
      mask-image: radial-gradient(ellipse at 86% 66%, #000 0 24%, rgba(0, 0, 0, 0.62) 40%, transparent 62%);
    }

    .water-motion {
      inset: 0;
      overflow: hidden;
    }

    .water-motion::before,
    .water-motion::after {
      content: "";
      left: -10%;
      width: 88%;
      height: 12%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.56) 0 1.5%, transparent 3%),
        linear-gradient(90deg, transparent, rgba(223, 247, 241, 0.64), rgba(255, 249, 237, 0.58), transparent);
      filter: blur(8px);
      mix-blend-mode: screen;
      transform: rotate(-3deg);
      opacity: 0.5;
    }

    .water-motion::before {
      top: 72%;
      animation: shoreline-lap 6.5s ease-in-out infinite;
      -webkit-mask-image: linear-gradient(180deg, transparent 0, #000 34%, #000 64%, transparent 100%);
      mask-image: linear-gradient(180deg, transparent 0, #000 34%, #000 64%, transparent 100%);
    }

    .water-motion::after {
      top: 69%;
      animation: shoreline-ripple 9s ease-in-out infinite;
      opacity: 0.34;
      filter: blur(14px);
      -webkit-mask-image: linear-gradient(180deg, transparent 0, #000 42%, transparent 92%);
      mask-image: linear-gradient(180deg, transparent 0, #000 42%, transparent 92%);
    }

    .holding-page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(6, 22, 22, 0.76), rgba(6, 22, 22, 0.34) 48%, rgba(6, 22, 22, 0.16)),
        linear-gradient(180deg, rgba(6, 22, 22, 0.2), rgba(6, 22, 22, 0.58));
    }

    .content {
      width: min(100%, 980px);
      display: grid;
      justify-items: start;
      gap: clamp(1.25rem, 2.5vw, 2rem);
    }

    h1 {
      max-width: 11ch;
      font-family: "Epilogue", Arial, sans-serif;
      font-size: clamp(3.5rem, 11vw, 9rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
      color: var(--sand);
      text-shadow: 0 8px 34px rgba(0, 0, 0, 0.42);
    }

    .coming-soon {
      color: rgba(244, 220, 168, 0.86);
      font-size: clamp(0.9rem, 1.5vw, 1.05rem);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 5px 22px rgba(0, 0, 0, 0.4);
    }

    @keyframes coastal-breeze {
      from {
        transform: scale(1.02) translate3d(-0.7%, 0, 0);
      }
      to {
        transform: scale(1.055) translate3d(0.7%, -0.4%, 0);
      }
    }

    @keyframes palm-sway {
      0%,
      100% {
        transform: scale(1.025) translate3d(0, 0, 0) skewX(0deg) rotate(0deg);
      }
      45% {
        transform: scale(1.04) translate3d(0.95%, -0.35%, 0) skewX(-1.9deg) rotate(-0.45deg);
      }
      70% {
        transform: scale(1.035) translate3d(0.25%, 0.15%, 0) skewX(0.8deg) rotate(0.2deg);
      }
    }

    @keyframes frond-gust {
      0%,
      100% {
        transform: translate3d(0, 0, 0) skewX(0deg) rotate(0deg);
      }
      40% {
        transform: translate3d(1.35%, -0.45%, 0) skewX(-3.2deg) rotate(-0.75deg);
      }
      72% {
        transform: translate3d(-0.25%, 0.18%, 0) skewX(1.4deg) rotate(0.28deg);
      }
    }

    @keyframes shoreline-lap {
      0%,
      100% {
        transform: translate3d(-3%, 1.1%, 0) rotate(-3deg) scaleX(0.94);
        opacity: 0.2;
      }
      46% {
        transform: translate3d(5%, -1.2%, 0) rotate(-3deg) scaleX(1.08);
        opacity: 0.48;
      }
      70% {
        transform: translate3d(2%, -0.35%, 0) rotate(-3deg) scaleX(1.02);
        opacity: 0.34;
      }
    }

    @keyframes shoreline-ripple {
      0%,
      100% {
        transform: translate3d(2%, 0.4%, 0) rotate(-3deg) scaleX(1);
      }
      50% {
        transform: translate3d(9%, -0.8%, 0) rotate(-3deg) scaleX(1.14);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .holding-page::before,
      .tree-motion,
      .tree-motion::before,
      .tree-motion::after,
      .water-motion::before,
      .water-motion::after {
        animation: none;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .holding-page {
        min-height: 100svh;
        align-items: end;
        padding: 1.25rem;
      }

      .holding-page::before {
        background-position: 58% center;
      }

      .tree-motion,
      .tree-motion::before,
      .tree-motion::after {
        background-position: 58% center;
      }

      .tree-motion::before,
      .tree-motion::after {
        opacity: 0.12;
      }

      .water-motion::before,
      .water-motion::after {
        left: -22%;
        width: 104%;
        top: 72%;
      }

      .holding-page::after {
        background:
          linear-gradient(180deg, rgba(6, 22, 22, 0.1), rgba(6, 22, 22, 0.72) 66%, rgba(6, 22, 22, 0.9)),
          linear-gradient(90deg, rgba(6, 22, 22, 0.36), rgba(6, 22, 22, 0.16));
      }

      .content {
        padding-bottom: clamp(1rem, 7vh, 4rem);
      }

      h1 {
        max-width: 8.5ch;
      }

    }
  </style>
</head>
<body>
  <main class="holding-page" aria-label="Coastarian.com coming soon">
    <span class="water-motion" aria-hidden="true"></span>
    <span class="tree-motion" aria-hidden="true"></span>
    <section class="content">
      <h1>Coastarian.com</h1>
      <span class="coming-soon">Coming soon</span>
    </section>
  </main>
</body>
</html>
